<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>스마트 플래너 Pro Max (Full Integration)</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>

    <style>
        :root {
            --bg-canvas: #ffffff;
            --bg-body: #f8f9fa;
            --text-main: #1a1a1a;
            --text-muted: #6c757d;
            --box-border: 3px solid #1a1a1a;
            --highlight: #dfff00;
            --accent-red: #ff4d4d;
            --accent-blue: #007bff;
            --soft-blue: #eef6ff;
            --success: #28a745;
            --radius: 24px;
            --shadow: 12px 12px 0px #1a1a1a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            line-height: 1.5;
        }

        /* Loading State */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #eee;
            border-top: 5px solid var(--text-main); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Main Container */
        .main-canvas {
            width: 100%; max-width: 1300px;
            background: var(--bg-canvas);
            border: var(--box-border);
            padding: 40px;
            box-shadow: var(--shadow);
            border-radius: var(--radius);
            position: relative;
        }

        /* Header Section */
        .header-section { text-align: center; margin-bottom: 40px; }
        .header-title-wrapper { display: inline-block; position: relative; }
        .header-title { 
            font-size: 42px; font-weight: 900; margin: 0; padding: 10px 20px;
            cursor: pointer; transition: all 0.2s;
        }
        .header-title:hover { transform: translateY(-3px); }
        .status-badge {
            font-size: 12px; padding: 4px 12px; border: 2px solid var(--text-main);
            border-radius: 20px; font-weight: bold; margin-top: 10px; display: inline-block;
        }

        /* Subject Selector Grid */
        .selector-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px; margin-bottom: 40px;
        }
        .selector-box {
            border: 2px solid var(--text-main); padding: 15px;
            border-radius: 18px; background: #fff;
        }
        .selector-box h4 { margin: 0 0 10px 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .btn-stack { display: flex; flex-direction: column; gap: 6px; }
        
        .sub-btn {
            width: 100%; padding: 8px; border: 1.5px solid var(--text-main);
            border-radius: 8px; background: #fff; font-size: 13px;
            font-weight: 700; cursor: pointer; text-align: left;
            transition: all 0.2s;
        }
        .sub-btn.active { background: var(--text-main); color: #fff; }
        .sub-btn:hover:not(.active) { background: #f0f0f0; }

        /* Layout Columns */
        .layout-container { display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 1100px) { .layout-container { grid-template-columns: 3fr 1.2fr; } }

        /* View Panels */
        .panel { 
            border: var(--box-border); border-radius: var(--radius); 
            padding: 25px; background: #fff; position: relative;
        }
        .panel-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .panel-nav h3 { margin: 0; font-size: 22px; font-weight: 800; }
        
        .nav-actions { display: flex; gap: 10px; }
        .icon-btn {
            background: #fff; border: 2px solid var(--text-main);
            padding: 8px 15px; border-radius: 12px; font-weight: 700;
            cursor: pointer; font-size: 14px;
        }
        .icon-btn.primary { background: var(--text-main); color: #fff; }

        /* Timetable UI */
        .table-scroll { overflow-x: auto; margin: 0 -5px; }
        .table-main { width: 100%; border-collapse: separate; border-spacing: 8px; min-width: 700px; }
        .table-main th { padding: 15px; font-weight: 800; font-size: 16px; border-bottom: 3px solid var(--text-main); }
        .table-main td { 
            border: 2px solid var(--text-main); border-radius: 14px;
            height: 90px; width: 18%; vertical-align: top; padding: 10px;
            transition: transform 0.2s; position: relative;
        }
        .table-main td:hover { transform: scale(1.02); background: #fafafa; }
        .period-num { 
            width: 45px; background: var(--text-main); color: #fff; 
            text-align: center; vertical-align: middle; border-radius: 12px;
        }
        
        .cell-content { display: flex; flex-direction: column; height: 100%; }
        .subject-name { font-weight: 900; font-size: 15px; margin-bottom: 4px; }
        .room-name { font-size: 11px; color: var(--text-muted); font-weight: 600; }
        .cell-tag {
            margin-top: auto; background: var(--highlight);
            font-size: 10px; padding: 2px 6px; border: 1.5px solid var(--text-main);
            border-radius: 5px; font-weight: 800; display: inline-block;
        }

        /* Calendar UI */
        .calendar-wrap { display: none; }
        .calendar-wrap.active { display: block; }
        .calendar-header { 
            display: flex; justify-content: center; align-items: center; 
            gap: 20px; margin-bottom: 20px; 
        }
        .month-select {
            font-size: 24px; font-weight: 900; border: 3px solid var(--text-main);
            padding: 5px 15px; border-radius: 12px; cursor: pointer; outline: none;
        }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .cal-day-label { text-align: center; font-weight: 800; padding: 10px; font-size: 14px; color: var(--text-muted); }
        .cal-cell {
            min-height: 120px; border: 2px solid var(--text-main); border-radius: 15px;
            padding: 10px; position: relative; background: #fff;
        }
        .cal-cell.today { border: 3px solid var(--accent-blue); background: var(--soft-blue); }
        .cal-cell.other-month { opacity: 0.3; pointer-events: none; }
        .cal-num { font-weight: 900; font-size: 16px; margin-bottom: 8px; display: block; }
        .cal-task-pill {
            font-size: 10px; background: #000; color: #fff;
            padding: 3px 6px; border-radius: 4px; margin-bottom: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* Task Form & List */
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 800; margin-bottom: 8px; color: var(--text-muted); }
        .form-input {
            width: 100%; padding: 12px 15px; border: 2.5px solid var(--text-main);
            border-radius: 12px; font-family: inherit; font-weight: 600; font-size: 15px;
            outline: none; transition: box-shadow 0.2s;
        }
        .form-input:focus { box-shadow: 4px 4px 0px var(--text-main); }
        
        .task-list-container { margin-top: 30px; border-top: 2px dashed #ddd; padding-top: 25px; }
        .task-item {
            background: #fff; border: 2.5px solid var(--text-main);
            border-radius: 16px; padding: 18px; margin-bottom: 15px;
            position: relative; transition: all 0.2s;
        }
        .task-item:hover { transform: translateX(5px); }
        .task-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .task-category { font-size: 11px; font-weight: 800; color: var(--accent-blue); text-transform: uppercase; }
        .task-title { font-weight: 900; font-size: 17px; margin: 0; }
        .task-meta { font-size: 12px; color: var(--text-muted); margin-top: 5px; font-weight: 600; }
        .task-actions { display: flex; gap: 10px; margin-top: 12px; }
        .action-link { cursor: pointer; font-size: 12px; font-weight: 800; text-decoration: underline; }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center;
            z-index: 1500; backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #fff; border: var(--box-border); border-radius: var(--radius);
            width: 90%; max-width: 450px; padding: 35px; position: relative;
            box-shadow: 20px 20px 0px rgba(0,0,0,0.2);
        }

        /* After School Specifics */
        .after-item {
            background: var(--soft-blue); border: 2px solid var(--accent-blue);
            padding: 10px 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .after-name { font-weight: 800; font-size: 14px; }
        .after-days { font-size: 11px; color: var(--accent-blue); font-weight: bold; }

        /* Utility */
        .hidden { display: none !important; }
        .text-red { color: var(--accent-red); }
        .mt-20 { margin-top: 20px; }
        .full-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 16px; font-weight: 900; cursor: pointer; }
        .btn-black { background: var(--text-main); color: #fff; }
        .btn-gray { background: #6c757d; color: #fff; margin-top: 10px; }

        /* Theme Panel (Floating) */
        .fab {
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
            background: var(--text-main); color: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 1000; border: 3px solid #fff;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <div style="font-weight: 900; letter-spacing: -0.5px;">서버 데이터 동기화 중...</div>
</div>

<div class="main-canvas">
    <div class="header-section">
        <div class="header-title-wrapper">
            <h1 id="planner-title" class="header-title" onclick="editPlannerTitle()">스마트 플래너 로딩...</h1>
        </div>
        <br>
        <div id="sync-status" class="status-badge">CLOUD OFFLINE</div>
    </div>

    <div class="selector-grid">
        <div id="group-A" class="selector-box"><h4>선택 A</h4><div class="btn-stack"></div></div>
        <div id="group-B" class="selector-box"><h4>선택 B</h4><div class="btn-stack"></div></div>
        <div id="group-C" class="selector-box"><h4>선택 C</h4><div class="btn-stack"></div></div>
        <div id="group-D" class="selector-box"><h4>선택 D</h4><div class="btn-stack"></div></div>
        <div id="group-E" class="selector-box"><h4>선택 E</h4><div class="btn-stack"></div></div>
        <div id="group-F" class="selector-box"><h4>선택 F</h4><div class="btn-stack"></div></div>
        <div id="group-G" class="selector-box"><h4>선택 G</h4><div class="btn-stack"></div></div>
        <div id="group-AS" class="selector-box">
            <h4>방과후</h4>
            <div id="after-school-list"></div>
            <button class="sub-btn" style="border: 2px dashed #ccc; text-align: center; margin-top: 10px;" onclick="openAfterModal()">+ 추가</button>
        </div>
    </div>

    <div class="layout-container">
        <div class="panel">
            <div class="panel-nav">
                <h3 id="view-mode-title">📅 주간 시간표</h3>
                <div class="nav-actions">
                    <button class="icon-btn" onclick="switchView('table')">주간</button>
                    <button class="icon-btn" onclick="switchView('calendar')">월간</button>
                </div>
            </div>

            <div id="view-table" class="table-scroll">
                <table class="table-main">
                    <thead>
                        <tr><th style="width:60px;">교시</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr>
                    </thead>
                    <tbody id="timetable-body">
                        </tbody>
                </table>
            </div>

            <div id="view-calendar" class="calendar-wrap">
                <div class="calendar-header">
                    <button class="icon-btn" onclick="changeMonth(-1)">◀</button>
                    <select id="month-select" class="month-select" onchange="renderCalendar()"></select>
                    <button class="icon-btn" onclick="changeMonth(1)">▶</button>
                </div>
                <div class="cal-grid" id="calendar-body">
                    </div>
            </div>
        </div>

        <div class="panel">
            <div id="task-form-area">
                <h3 style="margin-top:0;">📝 일정 등록</h3>
                <div class="form-group">
                    <label>과목 선택</label>
                    <select id="input-sub" class="form-input" onchange="autoSuggestPeriods()">
                        <option value="">과목을 선택하세요</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>활동 내용</label>
                    <input type="text" id="input-title" class="form-input" placeholder="수행평가, 숙제 등">
                </div>
                <div class="form-group">
                    <label>날짜 (MM/DD)</label>
                    <input type="text" id="input-date" class="form-input" placeholder="예: 05/20">
                </div>
                <div class="form-group">
                    <label>수업 교시 (자동 매칭)</label>
                    <select id="input-period" class="form-input">
                        <option value="">과목 선택 시 자동 검색</option>
                    </select>
                </div>
                <button id="save-task-btn" class="full-btn btn-black" onclick="saveTask()">등록하기</button>
                <button id="cancel-edit-btn" class="full-btn btn-gray hidden" onclick="resetTaskForm()">취소</button>
            </div>

            <div class="task-list-container">
                <div id="task-items-display">
                    </div>
            </div>
        </div>
    </div>
</div>

<div id="after-modal" class="modal-overlay">
    <div class="modal-box">
        <h3>방과후 활동 추가</h3>
        <div class="form-group">
            <label>활동 명칭</label>
            <input type="text" id="as-name" class="form-input" placeholder="예: 심화수학B">
        </div>
        <div class="form-group">
            <label>장소 (교실)</label>
            <input type="text" id="as-room" class="form-input" placeholder="예: 제1과학실">
        </div>
        <div class="form-group">
            <label>요일 선택 (중복 가능)</label>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <label><input type="checkbox" class="as-day" value="월"> 월</label>
                <label><input type="checkbox" class="as-day" value="화"> 화</label>
                <label><input type="checkbox" class="as-day" value="수"> 수</label>
                <label><input type="checkbox" class="as-day" value="목"> 목</label>
                <label><input type="checkbox" class="as-day" value="금"> 금</label>
            </div>
        </div>
        <button class="full-btn btn-black" onclick="addAfterSchool()">저장하기</button>
        <button class="full-btn btn-gray" onclick="closeAfterModal()">닫기</button>
    </div>
</div>

<div id="title-modal" class="modal-overlay">
    <div class="modal-box">
        <h3>플래너 이름 수정</h3>
        <input type="text" id="new-planner-title" class="form-input" placeholder="이름을 입력하세요">
        <button class="full-btn btn-black mt-20" onclick="updateTitle()">변경</button>
        <button class="full-btn btn-gray" onclick="document.getElementById('title-modal').classList.remove('active')">취소</button>
    </div>
</div>

<div class="fab" onclick="alert('테마 설정 기능은 다음 업데이트에 포함됩니다!')">🎨</div>

<script type="module">
    // --- 1. Firebase Configuration & Init ---
    const firebaseConfig = { 
        apiKey: "YOUR_API_KEY", 
        authDomain: "YOUR_AUTH_DOMAIN", 
        projectId: "YOUR_PROJECT_ID", 
        storageBucket: "YOUR_STORAGE_BUCKET", 
        messagingSenderId: "YOUR_SENDER_ID", 
        appId: "YOUR_APP_ID" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- 2. Data Structures ---
    const DAYS = ["월", "화", "수", "목", "금"];
    const SUB_GROUPS = {
        "A": [{n:"심화 국어", r:"3-6"}, {n:"여행지리", r:"3-2"}, {n:"생명과학II", r:"3-8"}, {n:"지구과학II", r:"지관실"}, {n:"인공지능", r:"시리우스"}],
        "B": [{n:"심화 국어", r:"3-4"}, {n:"확률과 통계", r:"3-6"}, {n:"여행지리", r:"3-9"}, {n:"정보과학", r:"아크로"}],
        "C": [{n:"확통", r:"3-9"}, {n:"논술", r:"3-4"}, {n:"인공지능", r:"시리우스"}, {n:"영화 비평", r:"3-7"}],
        "D": [{n:"심화 수학", r:"3-9"}, {n:"확통", r:"3-4"}, {n:"사회문제", r:"3-1"}, {n:"일본 문화", r:"3-8"}],
        "E": [{n:"사회문제", r:"3-6"}, {n:"세계 문제", r:"3-5"}, {n:"생명과학II", r:"3-11"}, {n:"인공지능", r:"시리우스"}],
        "F": [{n:"심화 수학", r:"3-11"}, {n:"심화 영어", r:"사비오"}, {n:"중국 문화", r:"3-1"}, {n:"영화 비평", r:"3-10"}],
        "G": [{n:"생활과 윤리", r:"3-3"}, {n:"한국지리", r:"3-7"}, {n:"과제 연구", r:"라우라"}, {n:"화학 II", r:"3-9"}]
    };

    const BASE_SCHEDULE = [
        ["독서", "G", "자율/창체", "E", "미적분"], 
        ["B", "D", "운동", "물리II", "독서"],
        ["운동", "물리II", "C", "F", "G"], 
        ["A", "E", "G", "미적분", "B"],
        ["영어 독해", "미적분", "독서", "A", "D"], 
        ["C", "영어 독해", "F", "영어 독해", "자율/창체"],
        ["공강", "공강", "물리II", "공강", "자율/창체"],
        ["(방과후)", "(방과후)", "(방과후)", "(방과후)", "(방과후)"]
    ];

    const CAL_DATA_2026 = [
        {n:"1월", d:31, s:4}, {n:"2월", d:28, s:0}, {n:"3월", d:31, s:0},
        {n:"4월", d:30, s:3}, {n:"5월", d:31, s:5}, {n:"6월", d:30, s:1},
        {n:"7월", d:31, s:3}, {n:"8월", d:31, s:6}, {n:"9월", d:30, s:2},
        {n:"10월", d:31, s:4}, {n:"11월", d:30, s:0}, {n:"12월", d:31, s:2}
    ];

    // --- 3. App State ---
    let state = {
        uid: null,
        title: "나의 스마트 플래너",
        selectedSubs: { A:null, B:null, C:null, D:null, E:null, F:null, G:null },
        afterSchools: [],
        tasks: [],
        currentMonth: new Date().getMonth(),
        editingTaskId: null
    };

    // --- 4. Initialization & Sync ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            state.uid = user.uid;
            document.getElementById('sync-status').innerText = "CLOUD SYNC: ACTIVE";
            const docRef = doc(db, "planners", user.uid);
            
            // Real-time listener
            onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    state.title = data.title || state.title;
                    state.selectedSubs = data.selectedSubs || state.selectedSubs;
                    state.afterSchools = data.afterSchools || [];
                    state.tasks = data.tasks || [];
                    renderAll();
                } else {
                    saveToFirebase(); // 초기 데이터 생성
                }
                document.getElementById('loading-overlay').style.display = 'none';
            });
        } else {
            signInAnonymously(auth).catch(e => alert("인증 오류: " + e.message));
        }
    });

    async function saveToFirebase() {
        if (!state.uid) return;
        try {
            await setDoc(doc(db, "planners", state.uid), {
                title: state.title,
                selectedSubs: state.selectedSubs,
                afterSchools: state.afterSchools,
                tasks: state.tasks
            });
        } catch (e) {
            console.error("저장 실패:", e);
        }
    }

    // --- 5. Rendering Engine ---
    function renderAll() {
        document.getElementById('planner-title').innerText = state.title;
        renderSelectors();
        renderTimetable();
        renderCalendar();
        renderTaskList();
        updateFormDropdowns();
    }

    function renderSelectors() {
        Object.keys(SUB_GROUPS).forEach(groupId => {
            const container = document.querySelector(`#group-${groupId} .btn-stack`);
            container.innerHTML = '';
            SUB_GROUPS[groupId].forEach(sub => {
                const btn = document.createElement('button');
                btn.className = `sub-btn ${state.selectedSubs[groupId]?.n === sub.n ? 'active' : ''}`;
                btn.innerText = sub.n;
                btn.onclick = () => {
                    state.selectedSubs[groupId] = sub;
                    saveToFirebase();
                };
                container.appendChild(btn);
            });
        });

        const asList = document.getElementById('after-school-list');
        asList.innerHTML = '';
        state.afterSchools.forEach((as, idx) => {
            asList.innerHTML += `
                <div class="after-item">
                    <div>
                        <div class="after-name">${as.name}</div>
                        <div class="after-days">${as.days.join(', ')}</div>
                    </div>
                    <div class="text-red" style="cursor:pointer; font-weight:bold" onclick="removeAfterSchool(${idx})">×</div>
                </div>
            `;
        });
    }

    function renderTimetable() {
        const body = document.getElementById('timetable-body');
        body.innerHTML = '';
        
        BASE_SCHEDULE.forEach((row, pIdx) => {
            let tr = `<tr><td class="period-num">${pIdx + 1}</td>`;
            row.forEach((cell, dIdx) => {
                let subName = cell;
                let room = "3-9"; // 기본 교실

                // 선택 과목 매칭
                if (state.selectedSubs[cell]) {
                    subName = state.selectedSubs[cell].n;
                    room = state.selectedSubs[cell].r;
                }
                
                // 방과후 매칭 (8교시 전용)
                if (pIdx === 7) {
                    const as = state.afterSchools.find(a => a.days.includes(DAYS[dIdx]));
                    subName = as ? as.name : "";
                    room = as ? as.room : "";
                }

                // 해당 교시의 Task 확인
                const hasTask = state.tasks.find(t => 
                    t.sub === subName && t.period === `${DAYS[dIdx]} ${pIdx+1}교시`
                );

                tr += `
                    <td>
                        <div class="cell-content">
                            <span class="subject-name">${subName}</span>
                            <span class="room-name">${room}</span>
                            ${hasTask ? `<span class="cell-tag">${hasTask.title}</span>` : ''}
                        </div>
                    </td>
                `;
            });
            body.innerHTML += tr + `</tr>`;
        });
    }

    function renderCalendar() {
        const monthSel = document.getElementById('month-select');
        if (monthSel.innerHTML === "") {
            CAL_DATA_2026.forEach((m, i) => {
                monthSel.innerHTML += `<option value="${i}">2026년 ${m.n}</option>`;
            });
        }
        monthSel.value = state.currentMonth;

        const body = document.getElementById('calendar-body');
        body.innerHTML = '';
        const dayLabels = ["일","월","화","수","목","금","토"];
        dayLabels.forEach(l => body.innerHTML += `<div class="cal-day-label">${l}</div>`);

        const mData = CAL_DATA_2026[state.currentMonth];
        // 빈칸
        for(let i=0; i<mData.s; i++) body.innerHTML += `<div class="cal-cell other-month"></div>`;
        // 날짜
        for(let d=1; d<=mData.d; d++) {
            const dateStr = `${String(state.currentMonth+1).padStart(2, '0')}/${String(d).padStart(2, '0')}`;
            const dayTasks = state.tasks.filter(t => t.date === dateStr);
            const isToday = new Date().getMonth() === state.currentMonth && new Date().getDate() === d;

            let taskHtml = dayTasks.map(t => `<div class="cal-task-pill">${t.title}</div>`).join('');
            body.innerHTML += `
                <div class="cal-cell ${isToday ? 'today' : ''}">
                    <span class="cal-num">${d}</span>
                    ${taskHtml}
                </div>
            `;
        }
    }

    function renderTaskList() {
        const container = document.getElementById('task-items-display');
        container.innerHTML = '<h4>📌 예정된 활동</h4>';
        if (state.tasks.length === 0) {
            container.innerHTML += `<div style="text-align:center; padding:20px; color:#999; font-size:13px;">등록된 일정이 없습니다.</div>`;
            return;
        }

        // 마감일 순 정렬
        const sorted = [...state.tasks].sort((a,b) => a.date.localeCompare(b.date));

        sorted.forEach(task => {
            const div = document.createElement('div');
            div.className = 'task-item';
            div.innerHTML = `
                <div class="task-item-header">
                    <div>
                        <div class="task-category">${task.sub}</div>
                        <h5 class="task-title">${task.title}</h5>
                    </div>
                </div>
                <div class="task-meta">📅 ${task.date} | ⏰ ${task.period}</div>
                <div class="task-actions">
                    <span class="action-link" onclick="editTask('${task.id}')">수정</span>
                    <span class="action-link text-red" onclick="deleteTask('${task.id}')">삭제</span>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function updateFormDropdowns() {
        const subSelect = document.getElementById('input-sub');
        const currentVal = subSelect.value;
        subSelect.innerHTML = '<option value="">과목 선택</option>';
        
        const mySubs = new Set(["독서","미적분","운동","영어 독해","물리II","자율/창체"]);
        Object.values(state.selectedSubs).forEach(s => { if(s) mySubs.add(s.n); });
        state.afterSchools.forEach(as => mySubs.add(as.name));

        Array.from(mySubs).forEach(name => {
            subSelect.innerHTML += `<option value="${name}">${name}</option>`;
        });
        subSelect.value = currentVal;
    }

    // --- 6. Event Handlers ---
    window.switchView = (mode) => {
        const table = document.getElementById('view-table');
        const cal = document.getElementById('view-calendar');
        const title = document.getElementById('view-mode-title');
        if (mode === 'table') {
            table.classList.remove('hidden'); cal.classList.remove('active');
            title.innerText = "📅 주간 시간표";
        } else {
            table.classList.add('hidden'); cal.classList.add('active');
            title.innerText = "📆 월간 캘린더";
        }
    };

    window.changeMonth = (dir) => {
        state.currentMonth = (state.currentMonth + dir + 12) % 12;
        renderCalendar();
    };

    window.autoSuggestPeriods = () => {
        const subName = document.getElementById('input-sub').value;
        const pSelect = document.getElementById('input-period');
        pSelect.innerHTML = '<option value="미지정">미지정</option>';
        
        if (!subName) return;

        // 시간표에서 해당 과목 시간 찾기
        BASE_SCHEDULE.forEach((row, p) => {
            row.forEach((cell, d) => {
                let currentSub = cell;
                if (state.selectedSubs[cell]) currentSub = state.selectedSubs[cell].n;
                if (p === 7) {
                    const as = state.afterSchools.find(a => a.days.includes(DAYS[d]));
                    if (as) currentSub = as.name;
                }

                if (currentSub === subName) {
                    const opt = `${DAYS[d]} ${p+1}교시`;
                    pSelect.innerHTML += `<option value="${opt}">${opt}</option>`;
                }
            });
        });
    };

    window.saveTask = () => {
        const title = document.getElementById('input-title').value;
        const sub = document.getElementById('input-sub').value;
        const date = document.getElementById('input-date').value;
        const period = document.getElementById('input-period').value;

        if (!title || !date) return alert("내용과 날짜를 입력하세요.");

        if (state.editingTaskId) {
            state.tasks = state.tasks.filter(t => t.id !== state.editingTaskId);
        }

        const newTask = {
            id: Date.now().toString(),
            title, sub, date, period
        };

        state.tasks.push(newTask);
        saveToFirebase();
        resetTaskForm();
    };

    window.editTask = (id) => {
        const task = state.tasks.find(t => t.id === id);
        if (!task) return;
        state.editingTaskId = id;
        document.getElementById('input-title').value = task.title;
        document.getElementById('input-sub').value = task.sub;
        window.autoSuggestPeriods();
        document.getElementById('input-date').value = task.date;
        document.getElementById('input-period').value = task.period;
        
        document.getElementById('save-task-btn').innerText = "수정하기";
        document.getElementById('cancel-edit-btn').classList.remove('hidden');
    };

    window.deleteTask = (id) => {
        if (confirm("일정을 삭제하시겠습니까?")) {
            state.tasks = state.tasks.filter(t => t.id !== id);
            saveToFirebase();
        }
    };

    window.resetTaskForm = () => {
        state.editingTaskId = null;
        document.getElementById('input-title').value = '';
        document.getElementById('input-date').value = '';
        document.getElementById('save-task-btn').innerText = "등록하기";
        document.getElementById('cancel-edit-btn').classList.add('hidden');
    };

    window.openAfterModal = () => document.getElementById('after-modal').classList.add('active');
    window.closeAfterModal = () => document.getElementById('after-modal').classList.remove('active');

    window.addAfterSchool = () => {
        const name = document.getElementById('as-name').value;
        const room = document.getElementById('as-room').value;
        const days = Array.from(document.querySelectorAll('.as-day:checked')).map(c => c.value);

        if (!name || days.length === 0) return alert("이름과 요일을 선택하세요.");

        state.afterSchools.push({ name, room, days });
        saveToFirebase();
        closeAfterModal();
        // 초기화
        document.getElementById('as-name').value = '';
        document.getElementById('as-room').value = '';
        document.querySelectorAll('.as-day').forEach(c => c.checked = false);
    };

    window.removeAfterSchool = (idx) => {
        state.afterSchools.splice(idx, 1);
        saveToFirebase();
    };

    window.editPlannerTitle = () => {
        document.getElementById('new-planner-title').value = state.title;
        document.getElementById('title-modal').classList.add('active');
    };

    window.updateTitle = () => {
        state.title = document.getElementById('new-planner-title').value;
        saveToFirebase();
        document.getElementById('title-modal').classList.remove('active');
    };

    // 초기 실행
    window.renderCalendar = renderCalendar;
</script>

</body>
</html>
