<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Campus v2 (Full Year)</title>
    <style>
        :root {
            --bg-canvas: #ffffff;
            --bg-body: #f5f7fa;
            --text-main: #1a1a1a;
            --box-border: 3px solid #1a1a1a;
            --highlight: #dfff00;
            --radius: 20px;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-body); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .main-canvas { width: 100%; max-width: 900px; background: #fff; border: var(--box-border); border-radius: var(--radius); padding: 20px; box-shadow: 8px 8px 0px #000; }
        .header { text-align: center; font-size: 24px; font-weight: 900; margin-bottom: 20px; }
        
        .view-controls { text-align: center; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border: 2px solid #000; border-radius: 30px; background: #fff; font-weight: 800; cursor: pointer; }
        
        #month-select { padding: 8px; border: 2px solid #000; border-radius: 10px; font-weight: 800; margin-bottom: 15px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #000; border: 2px solid #000; border-radius: 10px; overflow: hidden; }
        .cal-header { background: #f0f0f0; padding: 10px; text-align: center; font-size: 12px; font-weight: 800; }
        .cal-day { background: #fff; min-height: 80px; padding: 8px; font-size: 13px; position: relative; }
        .cal-day.empty { background: #fafafa; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="main-canvas">
    <div class="header">CAMPUS v2.0</div>
    
    <div class="view-controls">
        <button class="btn" onclick="toggleView()">전환: 주간 / 월간</button>
    </div>

    <div id="weekly-view">
        <p style="text-align:center;">📅 주간 시간표가 여기에 표시됩니다.</p>
    </div>

    <div id="monthly-view" class="hidden">
        <div style="text-align: center;">
            <select id="month-select" onchange="renderCalendar()"></select>
        </div>
        <div class="calendar-grid" id="calendar-body"></div>
    </div>
</div>

<script>
    // 2026년 1월~12월 달력 데이터 (일수, 시작요일: 0=일, 1=월...)
    const calData2026 = [
        { n: "1월", d: 31, s: 4 }, { n: "2월", d: 28, s: 0 }, { n: "3월", d: 31, s: 0 },
        { n: "4월", d: 30, s: 3 }, { n: "5월", d: 31, s: 5 }, { n: "6월", d: 30, s: 1 },
        { n: "7월", d: 31, s: 3 }, { n: "8월", d: 31, s: 6 }, { n: "9월", d: 30, s: 2 },
        { n: "10월", d: 31, s: 4 }, { n: "11월", d: 30, s: 0 }, { n: "12월", d: 31, s: 2 }
    ];

    window.onload = () => {
        const sel = document.getElementById('month-select');
        calData2026.forEach((m, i) => {
            sel.innerHTML += `<option value="${i}">2026년 ${m.n}</option>`;
        });
        sel.value = new Date().getMonth(); // 현재 달 자동 선택
        renderCalendar();
    };

    function renderCalendar() {
        const idx = document.getElementById('month-select').value;
        const config = calData2026[idx];
        const body = document.getElementById('calendar-body');
        body.innerHTML = '';

        ["일","월","화","수","목","금","토"].forEach(h => body.innerHTML += `<div class="cal-header">${h}</div>`);
        for(let i=0; i<config.s; i++) body.innerHTML += `<div class="cal-day empty"></div>`;
        for(let i=1; i<=config.d; i++) body.innerHTML += `<div class="cal-day"><b>${i}</b></div>`;
    }

    function toggleView() {
        document.getElementById('weekly-view').classList.toggle('hidden');
        document.getElementById('monthly-view').classList.toggle('hidden');
    }
</script>
</body>
</html>
