<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Campus v2.0</title>
    <style>
        :root {
            --bg-canvas: #ffffff;
            --bg-body: #f8f9fa;
            --text-main: #111111;
            --box-border: 3px solid #111111;
            --highlight: #dfff00;
            --accent-blue: #2563eb;
            --radius: 24px;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-body); padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .main-canvas { width: 100%; max-width: 1100px; background: #fff; border: var(--box-border); padding: 25px; box-shadow: 10px 10px 0px #000; border-radius: var(--radius); box-sizing: border-box; }
        .header-title { font-size: 26px; font-weight: 900; text-align: center; margin-bottom: 20px; }
        
        /* 과목 선택 영역 */
        .selection-grid { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 15px; margin-bottom: 20px; scrollbar-width: none; }
        .selection-grid::-webkit-scrollbar { display: none; }
        .select-box { flex: 0 0 150px; border: 2px solid #000; padding: 10px; border-radius: 15px; background: #fff; }
        .select-box h4 { margin: 0 0 8px 0; font-size: 10px; color: #888; text-align: center; }
        .btn-group { display: flex; flex-direction: column; gap: 5px; }
        button.subject-btn { padding: 8px; border: 1.5px solid #000; background: #fff; font-size: 12px; font-weight: 700; border-radius: 8px; cursor: pointer; }
        button.subject-btn.active { background: #000; color: #fff; }

        /* 테이블 및 레이아웃 */
        .content-layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1024px) { .content-layout { grid-template-columns: 2.5fr 1.5fr; } }
        .view-panel, .task-panel { border: var(--box-border); border-radius: var(--radius); padding: 20px; }
        
        .timetable { width: 100%; border-collapse: collapse; text-align: center; }
        .timetable th, .timetable td { border: 1px solid #eee; padding: 10px; height: 50px; }
        .timetable th { background: #f9fafb; font-weight: 800; border-bottom: 2px solid #000; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #000; border: 2px solid #000; border-radius: 10px; overflow: hidden; }
        .cal-header { background: #f8f9fa; padding: 10px; text-align: center; font-size: 11px; font-weight: 800; }
        .cal-day { background: #fff; min-height: 80px; padding: 5px; font-size: 12px; }
        
        .hidden { display: none !important; }
        .add-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 2px solid #000; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="main-canvas">
    <div class="header-title">Campus v2.0 (Full)</div>

    <div class="selection-grid" id="selection-grid">
        </div>

    <div class="content-layout">
        <div class="view-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 id="view-title" style="margin:0;">⏰ Weekly</h3>
                <button onclick="toggleView()" style="cursor:pointer; font-weight:800; border-radius:20px; border:2px solid #000; background:#fff; padding:5px 15px;">전환</button>
            </div>
            
            <div id="weekly-view">
                <table class="timetable">
                    <thead><tr><th>#</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr></thead>
                    <tbody id="timetable-body"></tbody>
                </table>
            </div>

            <div id="monthly-view" class="hidden">
                <select id="month-select" onchange="renderCalendar()"></select>
                <div class="calendar-grid" id="calendar-body"></div>
            </div>
        </div>

        <div class="task-panel">
            <h3>📝 New Plan</h3>
            <select id="task-sub-select"></select>
            <input type="text" id="task-title" placeholder="할 일 입력">
            <input type="text" id="task-date" placeholder="날짜 (MM/DD)">
            <button class="add-btn" onclick="saveTask()">저장</button>
            <div id="task-list" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<script>
    const subjectGroups = {
        "A": [{n:"심화 국어", r:"3-6"}, {n:"여행지리", r:"3-2"}, {n:"생명과학II", r:"3-8"}],
        "B": [{n:"심화 국어", r:"3-4"}, {n:"확률과 통계", r:"3-6"}],
        "C": [{n:"확률과 통계", r:"3-9"}, {n:"논술", r:"3-4"}],
        "D": [{n:"심화 수학", r:"3-9"}, {n:"사회문제 탐구", r:"3-1"}],
        "E": [{n:"사회문제 탐구", r:"3-6"}, {n:"여행지리", r:"3-5"}],
        "F": [{n:"심화 수학", r:"3-11"}, {n:"심화 영어", r:"사비오실"}],
        "G": [{n:"생활과 윤리", r:"3-3"}, {n:"한국지리", r:"3-7"}]
    };
    const baseSchedule = [
        ["독서", "G", "자율/창체", "E", "미적분"], ["B", "D", "운동과 건강", "물리학II", "독서"],
        ["운동과 건강", "물리학II", "C", "F", "G"], ["A", "E", "G", "미적분", "B"],
        ["영어 독해", "미적분", "독서", "A", "D"], ["C", "영어 독해", "F", "영어 독해", "자율/창체"],
        ["공강", "공강", "물리학II", "공강", "자율/창체"]
    ];
    const calData2026 = [
        { n: "1월", d: 31, s: 4 }, { n: "2월", d: 28, s: 0 }, { n: "3월", d: 31, s: 0 },
        { n: "4월", d: 30, s: 3 }, { n: "5월", d: 31, s: 5 }, { n: "6월", d: 30, s: 1 },
        { n: "7월", d: 31, s: 3 }, { n: "8월", d: 31, s: 6 }, { n: "9월", d: 30, s: 2 },
        { n: "10월", d: 31, s: 4 }, { n: "11월", d: 30, s: 0 }, { n: "12월", d: 31, s: 2 }
    ];

    let state = { subjects: {}, tasks: [] };

    window.onload = () => {
        const sel = document.getElementById('month-select');
        calData2026.forEach((m, i) => sel.innerHTML += `<option value="${i}">2026년 ${m.n}</option>`);
        sel.value = new Date().getMonth();
        updateUI();
    };

    function updateUI() {
        renderSelection();
        renderTimetable();
        renderCalendar();
        renderTasks();
        updateSubDropdown();
    }

    function renderSelection() {
        const grid = document.getElementById('selection-grid');
        grid.innerHTML = '';
        Object.keys(subjectGroups).forEach(g => {
            const box = document.createElement('div'); box.className = 'select-box';
            box.innerHTML = `<h4>GROUP ${g}</h4>`;
            const groupDiv = document.createElement('div'); groupDiv.className = 'btn-group';
            subjectGroups[g].forEach(s => {
                const btn = document.createElement('button');
                btn.className = `subject-btn ${state.subjects[g]?.n === s.n ? 'active' : ''}`;
                btn.innerText = s.n;
                btn.onclick = () => { state.subjects[g] = s; updateUI(); };
                groupDiv.appendChild(btn);
            });
            box.appendChild(groupDiv); grid.appendChild(box);
        });
    }

    function renderTimetable() {
        const body = document.getElementById('timetable-body');
        body.innerHTML = '';
        baseSchedule.forEach((row, p) => {
            let tr = document.createElement('tr');
            tr.innerHTML = `<td>${p+1}</td>`;
            row.forEach(cell => {
                let name = state.subjects[cell] ? state.subjects[cell].n : cell;
                tr.innerHTML += `<td>${name}</td>`;
            });
            body.appendChild(tr);
        });
    }

    function renderCalendar() {
        const idx = document.getElementById('month-select').value;
        const config = calData2026[idx];
        const body = document.getElementById('calendar-body');
        body.innerHTML = '';
        ["일","월","화","수","목","금","토"].forEach(h => body.innerHTML += `<div class="cal-header">${h}</div>`);
        for(let i=0; i<config.s; i++) body.innerHTML += `<div class="cal-day"></div>`;
        for(let i=1; i<=config.d; i++) body.innerHTML += `<div class="cal-day"><b>${i}</b></div>`;
    }

    function updateSubDropdown() {
        const sel = document.getElementById('task-sub-select');
        sel.innerHTML = '<option value="">과목 선택</option>';
        Object.values(state.subjects).forEach(s => { if(s) sel.innerHTML += `<option>${s.n}</option>`; });
    }

    window.saveTask = () => {
        const title = document.getElementById('task-title').value;
        const date = document.getElementById('task-date').value;
        if(title) {
            state.tasks.push({ title, date });
            renderTasks();
            document.getElementById('task-title').value = '';
        }
    };

    function renderTasks() {
        const list = document.getElementById('task-list');
        list.innerHTML = '';
        state.tasks.forEach(t => list.innerHTML += `<div style="border-bottom:1px solid #eee; padding:5px;">${t.date} - ${t.title}</div>`);
    }

    window.toggleView = () => {
        document.getElementById('weekly-view').classList.toggle('hidden');
        document.getElementById('monthly-view').classList.toggle('hidden');
    }
</script>
</body>
</html>
