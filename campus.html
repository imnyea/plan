<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Daily Campus v3 - Full Integration</title>
    
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css">

    <style>
        :root {
            --bg-canvas: #ffffff;
            --bg-body: #f5f7fa;
            --text-main: #1a1a1a;
            --text-muted: #71717a;
            --box-border: 3px solid #1a1a1a;
            --highlight: #dfff00;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --radius: 24px;
            --shadow: 10px 10px 0px #1a1a1a;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Loading Screen */
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #000; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Main Container */
        .main-canvas {
            width: 100%; max-width: 1100px;
            background: var(--bg-canvas);
            border: var(--box-border);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow);
            margin-top: 20px;
        }

        .header-top {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; border-bottom: 2px dashed #ddd; padding-bottom: 15px;
        }
        .main-title { font-size: 28px; font-weight: 900; margin: 0; cursor: pointer; }

        /* Subject Selection */
        .selection-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }
        .group-card {
            border: 2px solid var(--text-main); padding: 12px; border-radius: 15px;
            background: #fff;
        }
        .group-card h4 { margin: 0 0 8px 0; font-size: 12px; color: var(--text-muted); }
        .sub-btn-stack { display: flex; flex-direction: column; gap: 5px; }
        .sub-btn {
            width: 100%; padding: 7px 10px; border: 1.5px solid var(--text-main);
            border-radius: 8px; background: #fff; font-weight: 700; font-size: 12px;
            cursor: pointer; text-align: left;
        }
        .sub-btn.active { background: var(--text-main); color: #fff; }

        /* Layout */
        .content-layout { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 1024px) { .content-layout { grid-template-columns: 2fr 1fr; } }

        .panel { border: var(--box-border); border-radius: var(--radius); padding: 20px; background: #fff; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* Timetable */
        .scroll-wrapper { overflow-x: auto; }
        .table-core { width: 100%; border-collapse: separate; border-spacing: 5px; min-width: 600px; }
        .table-core th { padding: 10px; background: #f9f9f9; border-radius: 8px; font-size: 13px; }
        .table-core td {
            border: 1.5px solid #eee; border-radius: 10px; height: 80px;
            padding: 8px; vertical-align: top;
        }
        .cell-sub { font-weight: 900; font-size: 13px; display: block; }
        .cell-room { font-size: 10px; color: var(--text-muted); }
        .cell-badge { background: var(--highlight); font-size: 9px; padding: 2px 4px; border: 1px solid #000; border-radius: 4px; display: inline-block; margin-top: 5px; }

        /* Calendar */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-head { text-align: center; font-weight: bold; font-size: 11px; padding: 5px; }
        .cal-day { min-height: 80px; border: 1.5px solid #eee; border-radius: 10px; padding: 5px; }
        .cal-day.today { border: 2px solid var(--accent-blue); background: #f0f7ff; }

        /* Forms */
        .form-ctrl { width: 100%; padding: 10px; border: 2px solid var(--text-main); border-radius: 10px; font-family: inherit; font-weight: 700; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 12px; background: var(--text-main); color: #fff; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; }
        
        .task-card { border: 2px solid var(--text-main); border-radius: 12px; padding: 12px; margin-bottom: 10px; position: relative; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loading"><div class="loader"></div><p>데이터 동기화 중...</p></div>

<div class="main-canvas">
    <div class="header-top">
        <h1 class="main-title" id="display-title" onclick="changeTitle()">Daily Campus v3</h1>
        <div id="auth-status" style="font-size: 11px; font-weight: bold;">연결 대기...</div>
    </div>

    <div class="selection-grid">
        <div id="sel-A" class="group-card"><h4>선택 A</h4><div class="sub-btn-stack"></div></div>
        <div id="sel-B" class="group-card"><h4>선택 B</h4><div class="sub-btn-stack"></div></div>
        <div id="sel-C" class="group-card"><h4>선택 C</h4><div class="sub-btn-stack"></div></div>
        <div id="sel-D" class="group-card"><h4>선택 D</h4><div class="sub-btn-stack"></div></div>
        <div id="sel-E" class="group-card"><h4>선택 E</h4><div class="sub-btn-stack"></div></div>
        <div id="sel-F" class="group-card"><h4>선택 F</h4><div class="sub-btn-stack"></div></div>
        <div id="sel-G" class="group-card"><h4>선택 G</h4><div class="sub-btn-stack"></div></div>
        <div class="group-card">
            <h4>방과후</h4>
            <div id="after-list"></div>
            <button class="sub-btn" style="border: 1px dashed #ccc; text-align: center;" onclick="addAfterPrompt()">+ 추가</button>
        </div>
    </div>

    <div class="content-layout">
        <div class="panel">
            <div class="panel-header">
                <h3 id="view-title">⏰ 주간 시간표</h3>
                <button onclick="toggleView()" class="sub-btn" style="width: auto;">전환</button>
            </div>

            <div id="week-view" class="scroll-wrapper">
                <table class="table-core">
                    <thead><tr><th></th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr></thead>
                    <tbody id="timetable-body"></tbody>
                </table>
            </div>

            <div id="month-view" class="hidden">
                <select id="month-select" class="form-ctrl" style="width: auto;" onchange="renderCalendar()"></select>
                <div class="calendar-grid" id="calendar-body"></div>
            </div>
        </div>

        <div class="panel">
            <h3>📝 일정 추가</h3>
            <select id="task-sub" class="form-ctrl" onchange="autoMatch()"></select>
            <input type="text" id="task-title" class="form-ctrl" placeholder="활동 내용">
            <input type="text" id="task-date" class="form-ctrl" placeholder="날짜 (MM/DD)">
            <select id="task-period" class="form-ctrl"></select>
            <button class="btn-main" onclick="addTask()">등록</button>

            <div id="task-list-area" style="margin-top: 20px;"></div>
        </div>
    </div>
</div>

<script>
    // --- [중요] Firebase 설정값을 여기에 넣으세요 ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    // ------------------------------------------

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const DAYS = ["월", "화", "수", "목", "금"];
    const SUB_GROUPS = {
        "A": [{n:"심화 국어", r:"3-6"}, {n:"여행지리", r:"3-2"}, {n:"생명과학II", r:"3-8"}, {n:"지구과학II", r:"지관실"}, {n:"인공지능", r:"시리우스"}],
        "B": [{n:"심화 국어", r:"3-4"}, {n:"확률과 통계", r:"3-6"}, {n:"여행지리", r:"3-9"}, {n:"정보과학", r:"아크로"}],
        "C": [{n:"확통", r:"3-9"}, {n:"논술", r:"3-4"}, {n:"인공지능", r:"시리우스"}, {n:"영화 비평", r:"3-7"}],
        "D": [{n:"심화 수학", r:"3-9"}, {n:"확통", r:"3-4"}, {n:"사회문제", r:"3-1"}, {n:"일본 문화", r:"3-8"}],
        "E": [{n:"사회문제", r:"3-6"}, {n:"세계 문제", r:"3-5"}, {n:"생명과학II", r:"3-11"}, {n:"인공지능", r:"시리우스"}],
        "F": [{n:"심화 수학", r:"3-11"}, {n:"심화 영어", r:"사비오"}, {n:"중국 문화", r:"3-1"}, {n:"영화 비평", r:"3-10"}],
        "G": [{n:"생활과 윤리", r:"3-3"}, {n:"한국지리", r:"3-7"}, {n:"과제 연구", r:"라우라"}, {n:"화학 II", r:"3-9"}]
    };

    const BASE_SCHEDULE = [
        ["독서", "G", "자율/창체", "E", "미적분"], ["B", "D", "운동", "물리II", "독서"],
        ["운동", "물리II", "C", "F", "G"], ["A", "E", "G", "미적분", "B"],
        ["영어 독해", "미적분", "독서", "A", "D"], ["C", "영어 독해", "F", "영어 독해", "자율/창체"],
        ["공강", "공강", "물리II", "공강", "자율/창체"], ["", "", "", "", ""]
    ];

    const CAL_2026 = [
        {n:"1월", d:31, s:4}, {n:"2월", d:28, s:0}, {n:"3월", d:31, s:0},
        {n:"4월", d:30, s:3}, {n:"5월", d:31, s:5}, {n:"6월", d:30, s:1},
        {n:"7월", d:31, s:3}, {n:"8월", d:31, s:6}, {n:"9월", d:30, s:2},
        {n:"10월", d:31, s:4}, {n:"11월", d:30, s:0}, {n:"12월", d:31, s:2}
    ];

    let state = { title: "Daily Campus v3", selected: {}, after: [], tasks: [], uid: null };

    auth.onAuthStateChanged(user => {
        if (user) {
            state.uid = user.uid;
            document.getElementById('auth-status').innerText = "온라인 동기화 중";
            db.collection("planners").doc(user.uid).onSnapshot(doc => {
                if (doc.exists) { state = { ...state, ...doc.data() }; renderAll(); }
                else { save(); }
                document.getElementById('loading').style.display = 'none';
            });
        } else { auth.signInAnonymously(); }
    });

    async function save() { if (state.uid) await db.collection("planners").doc(state.uid).set(state); }

    function renderAll() {
        document.getElementById('display-title').innerText = state.title;
        renderSelection(); renderTimetable(); renderTasks(); renderCalendar(); updateDropdowns();
    }

    function renderSelection() {
        Object.keys(SUB_GROUPS).forEach(g => {
            const el = document.querySelector(`#sel-${g} .sub-btn-stack`);
            el.innerHTML = '';
            SUB_GROUPS[g].forEach(s => {
                const b = document.createElement('button');
                b.className = `sub-btn ${state.selected[g]?.n === s.n ? 'active' : ''}`;
                b.innerText = s.n;
                b.onclick = () => { state.selected[g] = s; save(); };
                el.appendChild(b);
            });
        });
        const aftEl = document.getElementById('after-list');
        aftEl.innerHTML = state.after.map((a, i) => `<div style="font-size:10px; margin-bottom:5px;"><b>${a.n}</b> (${a.d}) <span style="color:red; cursor:pointer;" onclick="delAfter(${i})">×</span></div>`).join('');
    }

    function renderTimetable() {
        const body = document.getElementById('timetable-body');
        body.innerHTML = '';
        BASE_SCHEDULE.forEach((row, p) => {
            let tr = `<tr><td style="font-weight:bold; font-size:12px; text-align:center;">${p+1}</td>`;
            row.forEach((cell, d) => {
                let name = cell, room = "3-9";
                if (state.selected[cell]) { name = state.selected[cell].n; room = state.selected[cell].r; }
                if (p === 7) { const a = state.after.find(x => x.d.includes(DAYS[d])); name = a?a.n:""; room = a?a.r:""; }
                const t = state.tasks.find(x => x.sub === name && x.per === `${DAYS[d]} ${p+1}교시`);
                tr += `<td><span class="cell-sub">${name}</span><span class="cell-room">${room}</span>${t?`<div class="cell-badge">${t.ttl}</div>`:''}</td>`;
            });
            body.innerHTML += tr + `</tr>`;
        });
    }

    function renderCalendar() {
        const sel = document.getElementById('month-select');
        if (!sel.innerHTML) CAL_2026.forEach((m, i) => sel.innerHTML += `<option value="${i}">2026년 ${m.n}</option>`);
        const mIdx = parseInt(sel.value || new Date().getMonth());
        const m = CAL_2026[mIdx];
        const body = document.getElementById('calendar-body');
        body.innerHTML = '';
        ["일","월","화","수","목","금","토"].forEach(h => body.innerHTML += `<div class="cal-head">${h}</div>`);
        for(let i=0; i<m.s; i++) body.innerHTML += `<div></div>`;
        for(let d=1; d<=m.d; d++) {
            const date = `${String(mIdx+1).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
            const ts = state.tasks.filter(x => x.dat === date);
            body.innerHTML += `<div class="cal-day"><b>${d}</b>${ts.map(x => `<div style="font-size:8px; background:#000; color:#fff; margin-top:2px;">${x.ttl}</div>`).join('')}</div>`;
        }
    }

    function renderTasks() {
        document.getElementById('task-list-area').innerHTML = state.tasks.map(t => `<div class="task-card"><span style="float:right; color:red; cursor:pointer;" onclick="delTask('${t.id}')">×</span><small>${t.sub}</small><br><b>${t.ttl}</b><br><small>${t.dat} | ${t.per}</small></div>`).join('');
    }

    function updateDropdowns() {
        const s = document.getElementById('task-sub');
        const prev = s.value; s.innerHTML = '<option value="">과목 선택</option>';
        const list = new Set(["독서","미적분","운동","영어 독해","물리II","자율/창체"]);
        Object.values(state.selected).forEach(x => { if(x) list.add(x.n); });
        state.after.forEach(x => list.add(x.n));
        list.forEach(x => s.innerHTML += `<option value="${x}">${x}</option>`);
        s.value = prev;
    }

    window.autoMatch = () => {
        const sub = document.getElementById('task-sub').value;
        const p = document.getElementById('task-period');
        p.innerHTML = '<option value="미지정">미지정</option>';
        BASE_SCHEDULE.forEach((row, rIdx) => row.forEach((cell, dIdx) => {
            let name = cell; if(state.selected[cell]) name = state.selected[cell].n;
            if(rIdx===7) { const a = state.after.find(x => x.d.includes(DAYS[dIdx])); name = a?a.n:""; }
            if(name === sub) p.innerHTML += `<option value="${DAYS[dIdx]} ${rIdx+1}교시">${DAYS[dIdx]} ${rIdx+1}교시</option>`;
        }));
    };

    window.addTask = () => {
        const ttl = document.getElementById('task-title').value;
        const dat = document.getElementById('task-date').value;
        const sub = document.getElementById('task-sub').value;
        const per = document.getElementById('task-period').value;
        if(!ttl || !dat) return alert("내용과 날짜를 입력하세요.");
        state.tasks.push({ id: Date.now().toString(), ttl, dat, sub, per });
        save(); document.getElementById('task-title').value = '';
    };

    window.delTask = id => { state.tasks = state.tasks.filter(x => x.id !== id); save(); };
    window.addAfterPrompt = () => {
        const n = prompt("활동명:"); const r = prompt("교실:"); const d = prompt("요일(쉼표구분, 예:월,수):");
        if(n && d) { state.after.push({ n, r, d: d.split(',') }); save(); }
    };
    window.delAfter = i => { state.after.splice(i, 1); save(); };
    window.toggleView = () => { document.getElementById('week-view').classList.toggle('hidden'); document.getElementById('month-view').classList.toggle('hidden'); };
    window.changeTitle = () => { const t = prompt("새 제목:", state.title); if(t) { state.title = t; save(); } };
    window.renderCalendar = renderCalendar;
</script>
</body>
</html>
