<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Daily Campus Pro (campus.html)</title>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>
    <style>
        :root {
            --bg-canvas: #ffffff;
            --bg-body: #f0f0f0;
            --text-main: #000000; /* 텍스트 컬러 기본값 */
            --box-border: 3px solid var(--text-main);
            --highlight: #ffff00;
            --radius: 20px;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 10px; /* 모바일 여백 감소 */
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-user-select: none;
            word-break: keep-all;
        }

        .main-canvas {
            width: 100%;
            max-width: 1200px;
            background: var(--bg-canvas);
            border: 3px solid var(--text-main);
            padding: clamp(15px, 4vw, 30px);
            box-shadow: 10px 10px 0px var(--text-main);
            border-radius: var(--radius);
            box-sizing: border-box;
        }

        /* 2. 모바일 선택 그리드 (2열 배치) */
        .selection-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        @media (min-width: 768px) {
            .selection-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .select-box {
            border: 2px solid var(--text-main);
            padding: 10px;
            border-radius: 15px;
        }

        .select-box h4 { margin: 0 0 8px 0; font-size: 12px; opacity: 0.7; color: var(--text-main); }
        
        button.subject-btn {
            padding: 6px 8px;
            border: 1.5px solid var(--text-main);
            background: var(--bg-canvas);
            color: var(--text-main);
            font-size: 11px;
            font-weight: bold;
            border-radius: 6px;
            margin-bottom: 4px;
            cursor: pointer;
        }
        button.subject-btn.active { background: var(--text-main); color: var(--bg-canvas); }

        /* 3. 시간표/달력 모바일 대응 */
        .content-layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1024px) { .content-layout { grid-template-columns: 2.8fr 1.2fr; } }

        .view-panel, .task-panel {
            border: 3px solid var(--text-main);
            border-radius: var(--radius);
            padding: 15px;
            background: var(--bg-canvas);
        }

        .timetable-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .timetable { width: 100%; border-collapse: collapse; min-width: 500px; color: var(--text-main); }
        .timetable th, .timetable td { border: 1.5px solid var(--text-main); padding: 8px 4px; text-align: center; height: 60px; }
        
        /* 4. 달력 (1년 분량) */
        .month-select-dropdown {
            background: var(--bg-canvas); border: 3px solid var(--text-main); border-radius: 10px; padding: 5px; font-weight: 900; font-size: 18px; color: var(--text-main);
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: var(--text-main); border: 1px solid var(--text-main); }
        .cal-header { background: #eee; color: #000; font-size: 11px; padding: 5px; text-align: center; }
        .cal-day { min-height: 80px; background: var(--bg-canvas); padding: 5px; font-size: 11px; color: var(--text-main); }
        .cal-task-item { background: var(--highlight); color: #000; border: 1px solid var(--text-main); font-size: 9px; margin-top: 2px; padding: 1px; border-radius: 3px; }

        /* 텍스트 입력창 */
        input, select { color: var(--text-main); border: 2px solid var(--text-main); background: var(--bg-canvas); padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        label { color: var(--text-main); font-size: 12px; font-weight: bold; }

        .theme-fab { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: var(--text-main); color: var(--bg-canvas); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; border: 2px solid var(--bg-canvas); }
        .theme-panel { position: fixed; bottom: 80px; right: 20px; width: 280px; background: #fff; border: 3px solid #000; border-radius: 20px; padding: 20px; z-index: 101; display: none; color: #000; }
        .theme-panel.active { display: block; }
        
        .hidden { display: none !important; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loading-overlay">데이터 동기화 중...</div>

<div class="main-canvas">
    <div class="header-container">
        <h2 id="main-title" class="header-title" style="color: var(--text-main);">Daily Campus</h2>
    </div>

    <div class="selection-grid">
        <div id="group-A" class="select-box"><h4>선택 A</h4><div class="btn-group"></div></div>
        <div id="group-B" class="select-box"><h4>선택 B</h4><div class="btn-group"></div></div>
        <div id="group-C" class="select-box"><h4>선택 C</h4><div class="btn-group"></div></div>
        <div id="group-D" class="select-box"><h4>선택 D</h4><div class="btn-group"></div></div>
        <div id="group-E" class="select-box"><h4>선택 E</h4><div class="btn-group"></div></div>
        <div id="group-F" class="select-box"><h4>선택 F</h4><div class="btn-group"></div></div>
        <div id="group-G" class="select-box"><h4>선택 G</h4><div class="btn-group"></div></div>
        <div id="group-After" class="select-box"><h4>방과후</h4><div id="after-school-display"></div></div>
    </div>

    <div class="content-layout">
        <div class="view-panel">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <h3 id="view-title" style="margin:0; font-size:16px; color:var(--text-main);">⏰ 주간 시간표</h3>
                <button onclick="toggleView()" style="cursor:pointer; border-radius:15px; border:2px solid var(--text-main); background:none; color:var(--text-main); font-weight:bold; padding:4px 10px;">전환</button>
            </div>
            
            <div id="weekly-view" class="timetable-wrapper">
                <table class="timetable">
                    <thead><tr><th style="width:30px;"></th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr></thead>
                    <tbody id="timetable-body"></tbody>
                </table>
            </div>
            
            <div id="monthly-view" class="hidden">
                <div style="text-align:center; margin-bottom:10px;">
                    <select id="single-month-select" class="month-select-dropdown" onchange="renderCalendar()"></select>
                </div>
                <div class="calendar-grid" id="calendar-body"></div>
            </div>
        </div>

        <div class="task-panel">
            <label>과목 선택</label>
            <select id="task-sub-select" onchange="updatePeriods()"></select>
            <label>내용</label>
            <input type="text" id="task-title" placeholder="할 일 입력">
            <label>날짜 (M/D)</label>
            <input type="text" id="task-date" placeholder="예: 5/15">
            <label>교시</label>
            <select id="task-period-select" disabled></select>
            <button onclick="saveTask()" style="background:var(--text-main); color:var(--bg-canvas); font-weight:bold; padding:12px; border:none; border-radius:10px; margin-top:10px; width:100%;">등록</button>
            <div id="task-list" style="margin-top:15px;"></div>
        </div>
    </div>
</div>

<div class="theme-fab" onclick="document.getElementById('theme-panel').classList.toggle('active')">🎨</div>
<div class="theme-panel" id="theme-panel">
    <h3>✨ 테마 설정</h3>
    <label>배경 색상</label>
    <input type="color" oninput="updateColor('bg', this.value)" style="height:40px; margin-bottom:10px;">
    <label>강조 색상</label>
    <input type="color" oninput="updateColor('high', this.value)" style="height:40px; margin-bottom:10px;">
    <label>텍스트 색상</label>
    <input type="color" oninput="updateColor('text', this.value)" style="height:40px; margin-bottom:10px;">
    <button onclick="document.getElementById('theme-panel').classList.remove('active')" style="width:100%; padding:10px; background:#000; color:#fff; border:none; border-radius:10px;">닫기</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Firebase 설정 (본인의 값으로 채워주세요)
    const firebaseConfig = { apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: "" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const days = ["월", "화", "수", "목", "금"];
    const subjectGroups = {
        "A": [{n:"심화 국어", r:"3-6"}, {n:"여행지리", r:"3-2"}, {n:"생명과학II", r:"3-8"}],
        "B": [{n:"심화 국어", r:"3-4"}, {n:"확률과 통계", r:"3-6"}, {n:"정보과학", r:"아크로"}],
        "C": [{n:"확률과 통계", r:"3-9"}, {n:"논술", r:"3-4"}, {n:"영화 비평", r:"3-7"}],
        "D": [{n:"심화 수학", r:"3-9"}, {n:"확률과 통계", r:"3-4"}, {n:"사회문제 탐구", r:"3-1"}],
        "E": [{n:"여행지리", r:"3-5"}, {n:"생명과학II", r:"3-11"}, {n:"일본 문화", r:"3-2"}],
        "F": [{n:"심화 영어", r:"사비오"}, {n:"생명과학II", r:"3-9"}, {n:"중국 문화", r:"3-1"}],
        "G": [{n:"생활과 윤리", r:"3-3"}, {n:"한국지리", r:"3-7"}, {n:"화학 II", r:"3-9"}]
    };
    const baseSchedule = [
        ["독서", "G", "자율", "E", "미적분"], ["B", "D", "체육", "물리II", "독서"],
        ["체육", "물리II", "C", "F", "G"], ["A", "E", "G", "미적분", "B"],
        ["영어", "미적분", "독서", "A", "D"], ["C", "영어", "F", "영어", "자율"],
        ["공강", "공강", "물리II", "공강", "자율"], ["", "", "", "", ""]
    ];

    const calData2026 = [
        { name: "1월", last: 31, start: 4 }, { name: "2월", last: 28, start: 0 },
        { name: "3월", last: 31, start: 0 }, { name: "4월", last: 30, start: 3 },
        { name: "5월", last: 31, start: 5 }, { name: "6월", last: 30, start: 1 },
        { name: "7월", last: 31, start: 3 }, { name: "8월", last: 31, start: 6 },
        { name: "9월", last: 30, start: 2 }, { name: "10월", last: 31, start: 4 },
        { name: "11월", last: 30, start: 0 }, { name: "12월", last: 31, start: 2 }
    ];

    let state = {
        subjects: {A:null, B:null, C:null, D:null, E:null, F:null, G:null},
        after: [], tasks: [], theme: {bg:"#ffffff", high:"#ffff00", text:"#000000"}
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const docRef = doc(db, 'planner', user.uid);
            onSnapshot(docRef, (snap) => {
                if (snap.exists()) state = snap.data();
                updateUI();
                document.getElementById('loading-overlay').style.display = 'none';
            });
        } else signInAnonymously(auth);
    });

    function save() { setDoc(doc(db, 'planner', auth.currentUser.uid), state); }

    function updateUI() {
        // 텍스트 컬러 포함 테마 적용
        const r = document.documentElement;
        r.style.setProperty('--bg-canvas', state.theme.bg);
        r.style.setProperty('--highlight', state.theme.high);
        r.style.setProperty('--text-main', state.theme.text);

        // 버튼 렌더링
        Object.keys(subjectGroups).forEach(g => {
            const box = document.querySelector(`#group-${g} .btn-group`);
            box.innerHTML = '';
            subjectGroups[g].forEach(s => {
                const b = document.createElement('button');
                b.className = `subject-btn ${state.subjects[g]?.n === s.n ? 'active' : ''}`;
                b.innerText = s.n;
                b.onclick = () => { state.subjects[g] = s; save(); };
                box.appendChild(b);
            });
        });

        // 시간표 렌더링
        const tb = document.getElementById('timetable-body');
        tb.innerHTML = '';
        baseSchedule.forEach((row, p) => {
            let tr = '<tr><td style="font-weight:bold; background:rgba(0,0,0,0.05)">'+(p+1)+'</td>';
            row.forEach((cell, d) => {
                let name = cell;
                if (state.subjects[cell]) name = state.subjects[cell].n;
                if (p === 7) {
                    const as = state.after.find(a => a.days.includes(days[d]));
                    name = as ? as.name : "";
                }
                const hasTask = state.tasks.find(t => t.sub === name && t.date.includes(`${new Date().getMonth()+1}/${new Date().getDate()}`));
                tr += `<td><div style="font-weight:900; font-size:13px;">${name}</div>${hasTask?'<div class="cal-task-item">수행</div>':''}</td>`;
            });
            tb.innerHTML += tr + '</tr>';
        });

        // 일정 과목 드롭다운 업데이트
        const subSel = document.getElementById('task-sub-select');
        subSel.innerHTML = '<option>과목 선택</option>';
        ["독서","미적분","영어","물리II"].forEach(s => subSel.innerHTML += `<option>${s}</option>`);
        Object.values(state.subjects).forEach(v => { if(v) subSel.innerHTML += `<option>${v.n}</option>`; });

        // 달력 드롭다운 초기화
        const mSel = document.getElementById('single-month-select');
        if(mSel.innerHTML === "") {
            calData2026.forEach((m, i) => mSel.innerHTML += `<option value="${i}">2026년 ${m.name}</option>`);
            mSel.value = new Date().getMonth();
        }
        renderCalendar();
    }

    window.renderCalendar = function() {
        const idx = document.getElementById('single-month-select').value;
        const m = calData2026[idx];
        const body = document.getElementById('calendar-body');
        body.innerHTML = '';
        ["일","월","화","수","목","금","토"].forEach(d => body.innerHTML += `<div class="cal-header">${d}</div>`);
        for(let i=0; i<m.start; i++) body.innerHTML += `<div class="cal-day" style="opacity:0.3"></div>`;
        for(let d=1; d<=m.last; d++) {
            const dateStr = (parseInt(idx)+1) + "/" + d;
            const dTasks = state.tasks.filter(t => t.date === dateStr);
            body.innerHTML += `<div class="cal-day">
                <div style="font-weight:bold;">${d}</div>
                ${dTasks.map(t => `<div class="cal-task-item">${t.sub}</div>`).join('')}
            </div>`;
        }
    };

    window.toggleView = () => {
        document.getElementById('weekly-view').classList.toggle('hidden');
        document.getElementById('monthly-view').classList.toggle('hidden');
    };

    window.updateColor = (type, val) => {
        state.theme[type] = val;
        updateUI();
        save();
    };

    window.saveTask = () => {
        const sub = document.getElementById('task-sub-select').value;
        const title = document.getElementById('task-title').value;
        const date = document.getElementById('task-date').value;
        if(!sub || !title) return;
        state.tasks.push({ id:Date.now(), sub, title, date });
        save();
    };
</script>
</body>
</html>
